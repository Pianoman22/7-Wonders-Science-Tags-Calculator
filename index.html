<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="7 Wonders Sci" />
  <title>7 Wonders – Science</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Cinzel+Decorative:wght@700&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #c9a84c;
      --gold-light: #f0d080;
      --gold-dark: #8a6a1f;
      --parchment: #f5e8c0;
      --ink: #2a1a05;
      --green-card: #2d6e2d;
      --green-light: #4a9e4a;
      --purple-guild: #5a2d82;
      --gear-color: #e07020;
      --compass-color: #3a7abf;
      --tablet-color: #c84040;
      --wild-color: #8a2d8a;
      --shadow: rgba(0,0,0,0.7);
    }

    html, body {
      height: 100%;
      font-family: 'IM Fell English', serif;
      background: #1a0e05;
      overflow-x: hidden;
    }

    /* ─── BACKGROUND ─── */
    .bg {
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse at 50% 0%, rgba(201,168,76,0.18) 0%, transparent 60%),
        radial-gradient(ellipse at 0% 100%, rgba(90,45,130,0.15) 0%, transparent 50%),
        radial-gradient(ellipse at 100% 100%, rgba(45,110,45,0.15) 0%, transparent 50%),
        linear-gradient(160deg, #1a0e05 0%, #0d1a0d 40%, #0a0a1a 70%, #1a0505 100%);
    }
    .bg::before {
      content: '';
      position: absolute; inset: 0;
      background-image:
        radial-gradient(circle at 20% 30%, rgba(201,168,76,0.06) 1px, transparent 1px),
        radial-gradient(circle at 80% 70%, rgba(201,168,76,0.06) 1px, transparent 1px);
      background-size: 40px 40px, 60px 60px;
    }

    /* ─── LAYOUT ─── */
    .app {
      position: relative; z-index: 1;
      min-height: 100vh;
      padding: 0 0 40px;
      display: flex; flex-direction: column; align-items: center;
    }

    /* ─── HEADER ─── */
    header {
      width: 100%;
      padding: 28px 20px 20px;
      text-align: center;
      border-bottom: 1px solid rgba(201,168,76,0.25);
      background: linear-gradient(to bottom, rgba(201,168,76,0.08), transparent);
    }
    .header-ornament {
      font-size: 11px;
      color: var(--gold);
      letter-spacing: 6px;
      text-transform: uppercase;
      font-family: 'Cinzel', serif;
      opacity: 0.7;
      margin-bottom: 6px;
    }
    header h1 {
      font-family: 'Cinzel Decorative', serif;
      font-size: clamp(18px, 5vw, 28px);
      color: var(--gold-light);
      text-shadow: 0 0 20px rgba(201,168,76,0.5), 0 2px 4px rgba(0,0,0,0.8);
      letter-spacing: 2px;
      line-height: 1.2;
    }
    header h2 {
      font-family: 'Cinzel', serif;
      font-size: clamp(11px, 3vw, 14px);
      color: var(--gold);
      opacity: 0.8;
      letter-spacing: 3px;
      margin-top: 4px;
      font-weight: 400;
    }

    /* ─── SECTIONS ─── */
    .section {
      width: 100%;
      max-width: 480px;
      padding: 0 16px;
      margin-top: 22px;
    }
    .section-title {
      font-family: 'Cinzel', serif;
      font-size: 11px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--gold);
      opacity: 0.75;
      margin-bottom: 12px;
      padding-left: 2px;
      display: flex; align-items: center; gap: 10px;
    }
    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, rgba(201,168,76,0.4), transparent);
    }

    /* ─── SYMBOL ROWS ─── */
    .symbol-row {
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(0,0,0,0.35);
      border: 1px solid rgba(201,168,76,0.18);
      border-radius: 12px;
      padding: 12px 14px;
      margin-bottom: 10px;
      backdrop-filter: blur(4px);
    }
    .symbol-icon {
      width: 44px; height: 44px;
      flex-shrink: 0;
      filter: drop-shadow(0 2px 6px rgba(0,0,0,0.6));
    }
    .symbol-label {
      flex: 1;
      font-family: 'Cinzel', serif;
      font-size: 13px;
      color: var(--parchment);
      opacity: 0.9;
    }
    .counter {
      display: flex; align-items: center; gap: 0;
    }
    .counter-btn {
      width: 36px; height: 36px;
      border: 1px solid rgba(201,168,76,0.4);
      background: rgba(201,168,76,0.1);
      color: var(--gold-light);
      font-size: 20px;
      font-family: 'Cinzel', serif;
      border-radius: 8px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
      line-height: 1;
    }
    .counter-btn:active { background: rgba(201,168,76,0.3); transform: scale(0.93); }
    .counter-val {
      width: 40px;
      text-align: center;
      font-family: 'Cinzel', serif;
      font-size: 22px;
      font-weight: 700;
      color: var(--gold-light);
      text-shadow: 0 0 10px rgba(201,168,76,0.6);
    }

    /* ─── WILD CARDS ─── */
    .wild-card {
      background: rgba(0,0,0,0.35);
      border: 1px solid rgba(201,168,76,0.18);
      border-radius: 12px;
      padding: 12px 14px;
      margin-bottom: 10px;
    }
    .wild-card-header {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 10px;
    }
    .wild-card-label {
      flex: 1;
      font-family: 'Cinzel', serif;
      font-size: 12px;
      color: var(--parchment);
      opacity: 0.85;
    }
    .wild-card-count {
      font-family: 'Cinzel', serif;
      font-size: 13px;
      color: var(--gold);
    }
    .wild-symbol-row {
      display: flex; gap: 8px; align-items: center;
    }
    .wild-symbol-btn {
      width: 40px; height: 40px;
      border-radius: 8px;
      border: 2px solid rgba(201,168,76,0.25);
      background: rgba(0,0,0,0.3);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
      padding: 4px;
    }
    .wild-symbol-btn.active {
      border-color: var(--gold);
      background: rgba(201,168,76,0.15);
      box-shadow: 0 0 10px rgba(201,168,76,0.3);
    }
    .wild-symbol-btn svg { width: 28px; height: 28px; }

    .add-wild-btn {
      width: 100%;
      padding: 10px;
      border: 1px dashed rgba(201,168,76,0.35);
      background: transparent;
      color: var(--gold);
      font-family: 'Cinzel', serif;
      font-size: 12px;
      letter-spacing: 2px;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .add-wild-btn:active { background: rgba(201,168,76,0.1); }

    .remove-btn {
      width: 28px; height: 28px;
      border: 1px solid rgba(201,168,76,0.25);
      background: rgba(200,40,40,0.15);
      color: rgba(255,120,120,0.8);
      font-size: 16px;
      border-radius: 6px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      -webkit-tap-highlight-color: transparent;
      flex-shrink: 0;
    }

    /* ─── CALCULATE BUTTON ─── */
    .calc-btn {
      width: calc(100% - 32px);
      max-width: 448px;
      margin: 24px 16px 0;
      padding: 16px;
      background: linear-gradient(135deg, #8a6a1f, #c9a84c, #8a6a1f);
      background-size: 200% 100%;
      border: none;
      border-radius: 12px;
      font-family: 'Cinzel', serif;
      font-size: 14px;
      letter-spacing: 3px;
      color: #1a0e05;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(201,168,76,0.35), inset 0 1px 0 rgba(255,255,255,0.2);
      transition: all 0.2s;
      -webkit-tap-highlight-color: transparent;
      text-transform: uppercase;
    }
    .calc-btn:active { transform: scale(0.98); box-shadow: 0 2px 10px rgba(201,168,76,0.2); }

    /* ─── RESULTS ─── */
    .results {
      width: 100%;
      max-width: 480px;
      padding: 0 16px;
      margin-top: 24px;
    }
    .result-card {
      border-radius: 14px;
      padding: 18px 16px;
      margin-bottom: 12px;
      position: relative;
      overflow: hidden;
    }
    .result-card.best {
      background: linear-gradient(135deg, rgba(45,110,45,0.4), rgba(45,110,45,0.2));
      border: 1px solid rgba(74,158,74,0.5);
      box-shadow: 0 0 20px rgba(45,110,45,0.2);
    }
    .result-card.second {
      background: rgba(0,0,0,0.3);
      border: 1px solid rgba(201,168,76,0.2);
    }
    .result-badge {
      font-family: 'Cinzel', serif;
      font-size: 9px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--gold);
      opacity: 0.75;
      margin-bottom: 8px;
    }
    .result-score {
      font-family: 'Cinzel Decorative', serif;
      font-size: 42px;
      color: var(--gold-light);
      text-shadow: 0 0 20px rgba(201,168,76,0.5);
      line-height: 1;
      margin-bottom: 4px;
    }
    .result-score span {
      font-size: 16px;
      opacity: 0.7;
      font-family: 'Cinzel', serif;
    }
    .result-breakdown {
      font-family: 'IM Fell English', serif;
      font-size: 12px;
      color: var(--parchment);
      opacity: 0.7;
      margin-bottom: 12px;
      font-style: italic;
    }
    .result-symbols {
      display: flex; gap: 8px; flex-wrap: wrap;
    }
    .result-sym {
      display: flex; align-items: center; gap: 5px;
      background: rgba(0,0,0,0.3);
      border: 1px solid rgba(201,168,76,0.2);
      border-radius: 8px;
      padding: 5px 10px;
    }
    .result-sym svg { width: 18px; height: 18px; }
    .result-sym-count {
      font-family: 'Cinzel', serif;
      font-size: 15px;
      font-weight: 700;
      color: var(--gold-light);
    }
    .result-sets {
      margin-top: 8px;
      font-family: 'Cinzel', serif;
      font-size: 11px;
      color: var(--gold);
      opacity: 0.8;
      letter-spacing: 1px;
    }

    .hidden { display: none; }

    /* ─── DECORATIVE DIVIDER ─── */
    .divider {
      width: 100%;
      max-width: 480px;
      padding: 0 16px;
      margin-top: 16px;
      text-align: center;
      color: var(--gold);
      opacity: 0.3;
      font-size: 18px;
      letter-spacing: 8px;
    }
  </style>
</head>
<body>
<div class="bg"></div>
<div class="app">

  <header>
    <h1>7 Wonders</h1>
    <h2>Science Symbol Calculator</h2>
  </header>

  <!-- FESTE SYMBOLE -->
  <div class="section">
    <div class="section-title">Fixed Symbols</div>

    <div class="symbol-row">
      <svg class="symbol-icon" viewBox="0 0 44 44" xmlns="http://www.w3.org/2000/svg">
        <!-- Zahnrad -->
        <circle cx="22" cy="22" r="19" fill="none" stroke="#e07020" stroke-width="1.2"/>
        <circle cx="22" cy="22" r="8" fill="none" stroke="#e07020" stroke-width="3.5"/>
        <circle cx="22" cy="22" r="3.5" fill="#e07020"/>
        <g stroke="#e07020" stroke-width="3.2" stroke-linecap="round">
          <line x1="22" y1="6" x2="22" y2="11"/>
          <line x1="22" y1="33" x2="22" y2="38"/>
          <line x1="6" y1="22" x2="11" y2="22"/>
          <line x1="33" y1="22" x2="38" y2="22"/>
          <line x1="10.1" y1="10.1" x2="13.6" y2="13.6"/>
          <line x1="30.4" y1="30.4" x2="33.9" y2="33.9"/>
          <line x1="33.9" y1="10.1" x2="30.4" y2="13.6"/>
          <line x1="13.6" y1="30.4" x2="10.1" y2="33.9"/>
        </g>
        <circle cx="22" cy="22" r="5.5" fill="none" stroke="#e07020" stroke-width="2"/>
      </svg>
      <div class="symbol-label">Gear</div>
      <div class="counter">
        <button class="counter-btn" onclick="change('gear',-1)">−</button>
        <div class="counter-val" id="val-gear">0</div>
        <button class="counter-btn" onclick="change('gear',1)">+</button>
      </div>
    </div>

    <div class="symbol-row">
      <svg class="symbol-icon" viewBox="0 0 44 44" xmlns="http://www.w3.org/2000/svg">
        <!-- Stechzirkel -->
        <!-- Pivot point at top center -->
        <circle cx="22" cy="9" r="2.5" fill="#3a7abf"/>
        <!-- Left leg -->
        <line x1="22" y1="9" x2="13" y2="34" stroke="#3a7abf" stroke-width="2.5" stroke-linecap="round"/>
        <!-- Right leg -->
        <line x1="22" y1="9" x2="31" y2="34" stroke="#3a7abf" stroke-width="2.5" stroke-linecap="round"/>
        <!-- Left sharp point -->
        <line x1="13" y1="34" x2="12" y2="39" stroke="#3a7abf" stroke-width="2" stroke-linecap="round"/>
        <!-- Right sharp point -->
        <line x1="31" y1="34" x2="32" y2="39" stroke="#3a7abf" stroke-width="2" stroke-linecap="round"/>
        <!-- Arc crossbar -->
        <path d="M 15 20 Q 22 24 29 20" fill="none" stroke="#3a7abf" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <div class="symbol-label">Compass</div>
      <div class="counter">
        <button class="counter-btn" onclick="change('compass',-1)">−</button>
        <div class="counter-val" id="val-compass">0</div>
        <button class="counter-btn" onclick="change('compass',1)">+</button>
      </div>
    </div>

    <div class="symbol-row">
      <svg class="symbol-icon" viewBox="0 0 44 44" xmlns="http://www.w3.org/2000/svg">
        <!-- Arched stele (style B) -->
        <path d="M10 26 L10 38 Q10 41 13 41 L31 41 Q34 41 34 38 L34 26 Q34 12 22 6 Q10 12 10 26 Z"
              fill="none" stroke="#c84040" stroke-width="2.2"/>
        <!-- small figure in arch -->
        <circle cx="22" cy="14" r="2.8" fill="none" stroke="#c84040" stroke-width="1.4"/>
        <line x1="22" y1="17" x2="22" y2="23" stroke="#c84040" stroke-width="1.4" stroke-linecap="round"/>
        <line x1="17" y1="20" x2="27" y2="20" stroke="#c84040" stroke-width="1.4" stroke-linecap="round"/>
        <!-- three engraved lines, all same width (x10 to x34) -->
        <line x1="13" y1="28" x2="31" y2="28" stroke="#c84040" stroke-width="1.8" stroke-linecap="round"/>
        <line x1="13" y1="33" x2="31" y2="33" stroke="#c84040" stroke-width="1.8" stroke-linecap="round"/>
        <line x1="13" y1="38" x2="24" y2="38" stroke="#c84040" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
      <div class="symbol-label">Tablet</div>
      <div class="counter">
        <button class="counter-btn" onclick="change('tablet',-1)">−</button>
        <div class="counter-val" id="val-tablet">0</div>
        <button class="counter-btn" onclick="change('tablet',1)">+</button>
      </div>
    </div>
  </div>

  <!-- FLEXIBLE KARTEN -->
  <div class="section">
    <div class="section-title">Flexible Symbols</div>
    <div id="wild-cards-container"></div>
    <button class="add-wild-btn" onclick="addWildCard()">+ Add Card</button>
  </div>

  <button class="calc-btn" onclick="calculate()">⚗ Calculate</button>

  <!-- ERGEBNISSE -->
  <div class="results hidden" id="results">
    <div class="divider">⸻ ✦ ⸻</div>
    <div style="margin-top: 16px;">
      <div class="section-title">Optimal Distribution</div>
    </div>

    <div class="result-card best" id="best-card">
      <div class="result-badge">✦ Best Option</div>
      <div class="result-score" id="best-score">0 <span>Points</span></div>
      <div class="result-breakdown" id="best-breakdown"></div>
      <div class="result-symbols" id="best-symbols"></div>
      <div class="result-sets" id="best-sets"></div>
    </div>

    <div class="result-card second" id="second-card">
      <div class="result-badge">Second Best Option</div>
      <div class="result-score" id="second-score">0 <span>Points</span></div>
      <div class="result-breakdown" id="second-breakdown"></div>
      <div class="result-symbols" id="second-symbols"></div>
      <div class="result-sets" id="second-sets"></div>
    </div>
  </div>

</div>

<script>
// ─── STATE ───
const state = { gear: 0, compass: 0, tablet: 0 };
let wildCards = []; // each: { options: ['gear','compass','tablet'] }
let cardIdCounter = 0;

// ─── SVG ICONS (inline) ───
const ICONS = {
  gear: `<svg viewBox="0 0 44 44" xmlns="http://www.w3.org/2000/svg">
    <circle cx="22" cy="22" r="19" fill="none" stroke="#e07020" stroke-width="1.2"/>
    <circle cx="22" cy="22" r="8" fill="none" stroke="#e07020" stroke-width="3.5"/>
    <circle cx="22" cy="22" r="3.5" fill="#e07020"/>
    <g stroke="#e07020" stroke-width="3.2" stroke-linecap="round">
      <line x1="22" y1="6" x2="22" y2="11"/>
      <line x1="22" y1="33" x2="22" y2="38"/>
      <line x1="6" y1="22" x2="11" y2="22"/>
      <line x1="33" y1="22" x2="38" y2="22"/>
      <line x1="10.1" y1="10.1" x2="13.6" y2="13.6"/>
      <line x1="30.4" y1="30.4" x2="33.9" y2="33.9"/>
      <line x1="33.9" y1="10.1" x2="30.4" y2="13.6"/>
      <line x1="13.6" y1="30.4" x2="10.1" y2="33.9"/>
    </g>
    <circle cx="22" cy="22" r="5.5" fill="none" stroke="#e07020" stroke-width="2"/>
  </svg>`,
  compass: `<svg viewBox="0 0 44 44" xmlns="http://www.w3.org/2000/svg">
    <circle cx="22" cy="9" r="2.5" fill="#3a7abf"/>
    <line x1="22" y1="9" x2="13" y2="34" stroke="#3a7abf" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="22" y1="9" x2="31" y2="34" stroke="#3a7abf" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="13" y1="34" x2="12" y2="39" stroke="#3a7abf" stroke-width="2" stroke-linecap="round"/>
    <line x1="31" y1="34" x2="32" y2="39" stroke="#3a7abf" stroke-width="2" stroke-linecap="round"/>
    <path d="M 15 20 Q 22 24 29 20" fill="none" stroke="#3a7abf" stroke-width="2" stroke-linecap="round"/>
  </svg>`,
  tablet: `<svg viewBox="0 0 44 44" xmlns="http://www.w3.org/2000/svg">
    <path d="M10 26 L10 38 Q10 41 13 41 L31 41 Q34 41 34 38 L34 26 Q34 12 22 6 Q10 12 10 26 Z"
          fill="none" stroke="#c84040" stroke-width="2.2"/>
    <circle cx="22" cy="14" r="2.8" fill="none" stroke="#c84040" stroke-width="1.4"/>
    <line x1="22" y1="17" x2="22" y2="23" stroke="#c84040" stroke-width="1.4" stroke-linecap="round"/>
    <line x1="17" y1="20" x2="27" y2="20" stroke="#c84040" stroke-width="1.4" stroke-linecap="round"/>
    <line x1="13" y1="28" x2="31" y2="28" stroke="#c84040" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="13" y1="33" x2="31" y2="33" stroke="#c84040" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="13" y1="38" x2="24" y2="38" stroke="#c84040" stroke-width="1.8" stroke-linecap="round"/>
  </svg>`,
  wild: `<svg viewBox="0 0 44 44" xmlns="http://www.w3.org/2000/svg">
    <polygon points="22,4 27,17 42,17 30,26 35,40 22,31 9,40 14,26 2,17 17,17" fill="none" stroke="#8a2d8a" stroke-width="2.2"/>
    <text x="22" y="27" text-anchor="middle" font-size="14" fill="#8a2d8a" font-family="serif">?</text>
  </svg>`
};

const LABELS = { gear: 'Gear', compass: 'Compass', tablet: 'Tablet' };
const ALL = ['gear', 'compass', 'tablet'];

// ─── COUNTER ───
function change(sym, delta) {
  state[sym] = Math.max(0, state[sym] + delta);
  document.getElementById('val-' + sym).textContent = state[sym];
}

// ─── WILD CARDS ───
function addWildCard() {
  const id = cardIdCounter++;
  wildCards.push({ id, options: ['gear', 'compass', 'tablet'] });
  renderWildCards();
}

function removeWildCard(id) {
  wildCards = wildCards.filter(c => c.id !== id);
  renderWildCards();
}

function toggleOption(cardId, sym) {
  const card = wildCards.find(c => c.id === cardId);
  if (!card) return;
  if (card.options.includes(sym)) {
    if (card.options.length > 1) card.options = card.options.filter(s => s !== sym);
  } else {
    card.options.push(sym);
  }
  renderWildCards();
}

function renderWildCards() {
  const container = document.getElementById('wild-cards-container');
  if (wildCards.length === 0) { container.innerHTML = ''; return; }

  container.innerHTML = wildCards.map(card => {
    const optCount = card.options.length;
    const typeLabel = optCount === 3 ? '3 possible symbols' : optCount === 2 ? '2 possible symbols' : '1 possible symbol';
    return `
    <div class="wild-card" id="wc-${card.id}">
      <div class="wild-card-header">
        <div class="symbol-icon" style="width:32px;height:32px;">${ICONS.wild}</div>
        <div class="wild-card-label">${typeLabel}</div>
        <button class="remove-btn" onclick="removeWildCard(${card.id})">✕</button>
      </div>
      <div class="wild-symbol-row">
        ${ALL.map(sym => `
          <button class="wild-symbol-btn ${card.options.includes(sym) ? 'active' : ''}"
                  onclick="toggleOption(${card.id}, '${sym}')">
            ${ICONS[sym]}
          </button>
        `).join('')}
        <div style="flex:1;font-family:'IM Fell English',serif;font-size:11px;color:rgba(245,232,192,0.5);font-style:italic;padding-left:4px;">
          Tap to toggle active options
        </div>
      </div>
    </div>`;
  }).join('');
}

// ─── SCORE ───
function score(g, c, t) {
  const sets = Math.min(g, c, t);
  return g*g + c*c + t*t + sets * 7;
}

// ─── BRUTE FORCE OPTIMIZER ───
function optimize() {
  // Each wild card has a list of options
  // Try all combinations recursively
  const base = { gear: state.gear, compass: state.compass, tablet: state.tablet };
  const results = [];

  function recurse(idx, cur) {
    if (idx === wildCards.length) {
      const s = score(cur.gear, cur.compass, cur.tablet);
      results.push({ ...cur, score: s });
      return;
    }
    const card = wildCards[idx];
    const seen = new Set();
    for (const sym of card.options) {
      if (seen.has(sym)) continue;
      seen.add(sym);
      const next = { ...cur };
      next[sym]++;
      recurse(idx + 1, next);
    }
  }

  recurse(0, { ...base });

  // Sort by score descending, deduplicate
  results.sort((a, b) => b.score - a.score);

  // Deduplicate by (gear, compass, tablet)
  const unique = [];
  const seen = new Set();
  for (const r of results) {
    const key = `${r.gear}-${r.compass}-${r.tablet}`;
    if (!seen.has(key)) { seen.add(key); unique.push(r); }
  }

  return unique;
}

// ─── RENDER RESULT CARD ───
function renderResult(cardEl, scoreEl, breakdownEl, symbolsEl, setsEl, result) {
  scoreEl.innerHTML = `${result.score} <span>Points</span>`;

  const sets = Math.min(result.gear, result.compass, result.tablet);
  const sq = result.gear**2 + result.compass**2 + result.tablet**2;
  breakdownEl.textContent = `${result.gear}² + ${result.compass}² + ${result.tablet}² = ${sq}  +  ${sets} Sets × 7 = ${sets*7}`;

  symbolsEl.innerHTML = ALL.map(sym => `
    <div class="result-sym">
      ${ICONS[sym]}
      <span class="result-sym-count">${result[sym]}</span>
    </div>
  `).join('');

  setsEl.textContent = sets > 0 ? `✦ ${sets} complete Set${sets === 1 ? '' : 's'}` : '';
}

// ─── CALCULATE ───
function calculate() {
  const unique = optimize();
  const resultsEl = document.getElementById('results');
  resultsEl.classList.remove('hidden');

  if (unique.length === 0) {
    // no wild cards – just compute
    const s = score(state.gear, state.compass, state.tablet);
    unique.push({ gear: state.gear, compass: state.compass, tablet: state.tablet, score: s });
  }

  const best = unique[0];
  renderResult(
    document.getElementById('best-card'),
    document.getElementById('best-score'),
    document.getElementById('best-breakdown'),
    document.getElementById('best-symbols'),
    document.getElementById('best-sets'),
    best
  );

  const secondCard = document.getElementById('second-card');
  if (unique.length > 1) {
    secondCard.classList.remove('hidden');
    renderResult(
      secondCard,
      document.getElementById('second-score'),
      document.getElementById('second-breakdown'),
      document.getElementById('second-symbols'),
      document.getElementById('second-sets'),
      unique[1]
    );
  } else {
    secondCard.classList.add('hidden');
  }

  resultsEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}
</script>
